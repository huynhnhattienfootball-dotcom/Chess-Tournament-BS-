<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Giải Đấu Cờ Vua</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1, h2 {
            text-align: center;
            color: #2c3e50;
        }
        .flex-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .panel {
            flex: 1;
            min-width: 300px;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
        }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #27ae60;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #219653;
        }
        button.btn-danger {
            background-color: #e74c3c;
        }
        button.btn-danger:hover {
            background-color: #c0392b;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }
        th {
            background-color: #34495e;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        tr:hover {
            background-color: #e8f4f8;
        }
        .match-list {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 10px;
            background: #fff;
        }
        .match-item {
            padding: 5px;
            border-bottom: 1px solid #eee;
            font-size: 0.9em;
        }
        .status-badge {
            background-color: #2980b9;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85em;
            float: right;
        }
    </style>
</head>
<body>

<div class="container">
    <span class="status-badge" id="storageStatus">Đã lưu tự động</span>
    <h1>🏆 Quản Lý Giải Đấu Cờ Vua</h1>
    
    <div class="flex-container">
        <div class="panel">
            <h2>Đăng Ký Kỳ Thủ</h2>
            <input type="text" id="playerName" placeholder="Nhập tên kỳ thủ...">
            <button onclick="addPlayer()">Thêm Kỳ Thủ</button>
            <button class="btn-danger" onclick="resetTournament()">Reset Giải Đấu</button>
            
            <h3>Danh sách đã thêm:</h3>
            <div id="registeredPlayers" style="font-style: italic; color: #555;">Chưa có kỳ thủ nào.</div>
        </div>

        <div class="panel">
            <h2>Nhập Kết Quả Trận Đấu</h2>
            <label for="player1">Kỳ thủ 1 (Trắng):</label>
            <select id="player1"></select>
            
            <label for="player2">Kỳ thủ 2 (Đen):</label>
            <select id="player2"></select>
            
            <label for="matchResult">Kết quả:</label>
            <select id="matchResult">
                <option value="1-0">1 - 0 (Trắng thắng)</option>
                <option value="0-1">0 - 1 (Đen thắng)</option>
                <option value="0.5-0.5">0.5 - 0.5 (Hòa)</option>
            </select>
            
            <button onclick="addMatch()">Cập Nhật Trận Đấu</button>
        </div>
    </div>

    <div class="panel" style="margin-bottom: 20px;">
        <h2>Lịch Sử Trận Đấu</h2>
        <div class="match-list" id="matchHistory">Chưa có trận đấu nào diễn ra.</div>
    </div>

    <h2>Bảng Xếp Hạng Hiện Tại</h2>
    <table id="rankTable">
        <thead>
            <tr>
                <th>Hạng</th>
                <th>Tên Kỳ Thủ</th>
                <th>Điểm số</th>
                <th>Buchholz</th>
                <th>Số Ván Thắng</th>
                <th>Sonneborn</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td colspan="6" style="text-align:center">Chưa có dữ liệu xếp hạng.</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    // Khởi tạo cấu trúc dữ liệu giải đấu
    let players = [];
    let matches = [];

    // Hàm thực hiện việc LƯU dữ liệu vào localStorage
    function saveToLocalStorage() {
        localStorage.setItem('chess_tournament_players', JSON.stringify(players));
        localStorage.setItem('chess_tournament_matches', JSON.stringify(matches));
        showStorageStatus();
    }

    // Hàm thực hiện việc TẢI dữ liệu cũ từ localStorage khi mở trang
    function loadFromLocalStorage() {
        const localPlayers = localStorage.getItem('chess_tournament_players');
        const localMatches = localStorage.getItem('chess_tournament_matches');

        if (localPlayers) {
            players = JSON.parse(localPlayers);
        }
        if (localMatches) {
            matches = JSON.parse(localMatches);
            // Tải lại giao diện lịch sử trận đấu
            const historyDiv = document.getElementById('matchHistory');
            if (matches.length > 0) historyDiv.innerHTML = "";
            
            matches.forEach((m, index) => {
                let p1Name = players.find(p => p.id === m.p1)?.name || "Ẩn danh";
                let p2Name = players.find(p => p.id === m.p2)?.name || "Ẩn danh";
                let matchText = `Trận ${index + 1}: ${p1Name} vs ${p2Name} ➔ Kết quả: ${m.result}`;
                historyDiv.innerHTML += `<div class="match-item">${matchText}</div>`;
            });
        }

        // Cập nhật lại toàn bộ giao diện sau khi tải dữ liệu
        updatePlayerSelects();
        updateRegisteredList();
        calculateStandings();
    }

    // Hiệu ứng nhấp nháy báo hiệu đã lưu thành công
    function showStorageStatus() {
        const badge = document.getElementById('storageStatus');
        badge.innerText = "⏳ Đang lưu...";
        badge.style.backgroundColor = "#e67e22";
        setTimeout(() => {
            badge.innerText = "✓ Đã lưu tự động";
            badge.style.backgroundColor = "#27ae60";
        }, 500);
    }

    // Thêm kỳ thủ mới
    function addPlayer() {
        const nameInput = document.getElementById('playerName');
        const name = nameInput.value.trim();
        
        if (name === "") {
            alert("Vui lòng nhập tên kỳ thủ!");
            return;
        }
        if (players.some(p => p.name === name)) {
            alert("Kỳ thủ này đã tồn tại!");
            return;
        }

        players.push({
            id: players.length > 0 ? Math.max(...players.map(p => p.id)) + 1 : 0, // Đảm bảo ID không trùng
            name: name,
            opponents: [],
            points: 0,
            buchholz: 0,
            wins: 0,
            sonneborn: 0
        });

        nameInput.value = "";
        updatePlayerSelects();
        updateRegisteredList();
        calculateStandings();
        saveToLocalStorage(); // Lưu trạng thái
    }

    // Cập nhật danh sách hiển thị tên kỳ thủ đã đăng ký
    function updateRegisteredList() {
        const listDiv = document.getElementById('registeredPlayers');
        if(players.length === 0) {
            listDiv.innerText = "Chưa có kỳ thủ nào.";
        } else {
            listDiv.innerText = players.map(p => p.name).join(", ");
        }
    }

    // Cập nhật các ô Chọn Kỳ Thủ trong form nhập kết quả
    function updatePlayerSelects() {
        const p1Select = document.getElementById('player1');
        const p2Select = document.getElementById('player2');
        
        p1Select.innerHTML = "";
        p2Select.innerHTML = "";

        players.forEach(p => {
            let opt1 = document.createElement('option');
            opt1.value = p.id;
            opt1.innerText = p.name;
            p1Select.appendChild(opt1);

            let opt2 = document.createElement('option');
            opt2.value = p.id;
            opt2.innerText = p.name;
            p2Select.appendChild(opt2);
        });
    }

    // Ghi nhận trận đấu mới
    function addMatch() {
        const p1Id = parseInt(document.getElementById('player1').value);
        const p2Id = parseInt(document.getElementById('player2').value);
        const result = document.getElementById('matchResult').value;

        if (p1Id === p2Id) {
            alert("Một kỳ thủ không thể tự thi đấu với chính mình!");
            return;
        }

        matches.push({ p1: p1Id, p2: p2Id, result: result });
        
        // Hiển thị lịch sử trận đấu
        const historyDiv = document.getElementById('matchHistory');
        if(matches.length === 1) historyDiv.innerHTML = "";
        
        let p1Name = players.find(p => p.id === p1Id).name;
        let p2Name = players.find(p => p.id === p2Id).name;
        
        let matchText = `Trận ${matches.length}: ${p1Name} vs ${p2Name} ➔ Kết quả: ${result}`;
        historyDiv.innerHTML += `<div class="match-item">${matchText}</div>`;

        calculateStandings();
        saveToLocalStorage(); // Lưu trạng thái
    }

    // Tính toán toàn bộ điểm và hệ số phụ để xếp hạng
    function calculateStandings() {
        players.forEach(p => {
            p.points = 0;
            p.wins = 0;
            p.buchholz = 0;
            p.sonneborn = 0;
            p.opponents = [];
        });

        // Bước 1: Tính Điểm cơ bản, Số ván thắng và ghi nhận Đối kháng trực tiếp
        matches.forEach(m => {
            let p1 = players.find(p => p.id === m.p1);
            let p2 = players.find(p => p.id === m.p2);

            // Phòng trường hợp kỳ thủ cũ bị xóa nhưng trận đấu vẫn nằm trong lịch sử
            if (!p1 || !p2) return; 

            if (m.result === "1-0") {
                p1.points += 1;
                p1.wins += 1;
                p1.opponents.push({ oppId: m.p2, score: 1 });
                p2.opponents.push({ oppId: m.p1, score: 0 });
            } else if (m.result === "0-1") {
                p2.points += 1;
                p2.wins += 1;
                p1.opponents.push({ oppId: m.p2, score: 0 });
                p2.opponents.push({ oppId: m.p1, score: 1 });
            } else if (m.result === "0.5-0.5") {
                p1.points += 0.5;
                p2.points += 0.5;
                p1.opponents.push({ oppId: m.p2, score: 0.5 });
                p2.opponents.push({ oppId: m.p1, score: 0.5 });
            }
        });

        // Bước 2: Tính hệ số Buchholz và Sonneborn-Berger
        players.forEach(p => {
            p.opponents.forEach(oppRelation => {
                let opponent = players.find(o => o.id === oppRelation.oppId);
                if (!opponent) return;
                
                p.buchholz += opponent.points;

                if (oppRelation.score === 1) {
                    p.sonneborn += opponent.points;
                } else if (oppRelation.score === 0.5) {
                    p.sonneborn += (opponent.points * 0.5);
                }
            });
        });

        // Bước 3: Sắp xếp bảng xếp hạng
        let rankedPlayers = [...players];
        
        rankedPlayers.sort((a, b) => {
            if (b.points !== a.points) return b.points - a.points;

            // Hệ số phụ 1: Đối kháng trực tiếp (Tính ngầm)
            let directMatchesA = a.opponents.filter(o => o.oppId === b.id);
            if (directMatchesA.length > 0) {
                let scoreA = directMatchesA.reduce((sum, current) => sum + current.score, 0);
                let scoreB = directMatchesA.length * 1 - scoreA;
                if (scoreA !== scoreB) {
                    return scoreB - scoreA;
                }
            }

            if (b.buchholz !== a.buchholz) return b.buchholz - a.buchholz;
            if (b.wins !== a.wins) return b.wins - a.wins;
            return b.sonneborn - a.sonneborn;
        });

        // Bước 4: Hiển thị lên giao diện HTML
        const tbody = document.querySelector("#rankTable tbody");
        tbody.innerHTML = "";

        if(rankedPlayers.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" style="text-align:center">Chưa có dữ liệu xếp hạng.</td></tr>`;
            return;
        }

        rankedPlayers.forEach((p, index) => {
            let row = `<tr>
                <td><b>${index + 1}</b></td>
                <td>${p.name}</td>
                <td style="color:#27ae60; font-weight:bold;">${p.points}</td>
                <td>${p.buchholz}</td>
                <td>${p.wins}</td>
                <td>${p.sonneborn}</td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }

    // Reset giải đấu và XÓA sạch bộ nhớ tạm
    function resetTournament() {
        if(confirm("Bạn có chắc chắn muốn xóa hết kỳ thủ và kết quả để làm lại từ đầu không?")) {
            players = [];
            matches = [];
            localStorage.removeItem('chess_tournament_players');
            localStorage.removeItem('chess_tournament_matches');
            
            document.getElementById('matchHistory').innerHTML = "Chưa có trận đấu nào diễn ra.";
            updatePlayerSelects();
            updateRegisteredList();
            calculateStandings();
            
            const badge = document.getElementById('storageStatus');
            badge.innerText = "Đã xóa dữ liệu";
            badge.style.backgroundColor = "#e74c3c";
        }
    }

    // CHẠY ĐẦU TIÊN: Khi trang web tải xong, tự động nạp lại dữ liệu cũ nếu có
    window.onload = function() {
        loadFromLocalStorage();
    };
</script>

</body>
</html>
